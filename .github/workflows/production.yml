name: Eventora CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ==========================================
  # CI STAGE: Build and Verify all 8 services
  # ==========================================
  verify-services:
    name: "CI — Java Services Verification"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [config-server, customer, discovery, gateway, notification, order, payment, product]
    steps:
      - name: "Checkout Source Code"
        uses: actions/checkout@v4

      - name: "Set up JDK 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: "Build and Package ${{ matrix.service }}"
        run: |
          cd services/${{ matrix.service }}
          chmod +x mvnw
          ./mvnw clean package -B -ntp -DskipTests -Dmaven.wagon.http.retryHandler.count=5 -Dmaven.wagon.http.retryHandler.requestSentRetryEnabled=true
        shell: bash

      - name: "Validate Build Artifacts"
        run: |
          if [ -d "services/${{ matrix.service }}/target" ]; then
            echo "✅ Target directory exists for ${{ matrix.service }}."
          else
            echo "❌ Target directory missing for ${{ matrix.service }}."
            exit 1
          fi
        shell: bash

  # ==========================================
  # CD STAGE: Build and Push Docker Images
  # ==========================================
  build-and-push-docker:
    name: "CD — Docker Build & Push"
    runs-on: ubuntu-24.04
    needs: verify-services
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    strategy:
      fail-fast: false
      matrix:
        service: [config-server, customer, discovery, gateway, notification, order, payment, product]
    steps:
      - name: "Checkout Source Code"
        uses: actions/checkout@v4

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Login to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Build and Push Docker Image"
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/java-microservice-${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/java-microservice-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}


  # ==========================================
  # GITOPS STAGE: Update Manifests Automatically
  # ==========================================
  update-gitops:
    name: "GitOps — Update Image Tags"
    runs-on: ubuntu-latest
    needs: build-and-push-docker
    strategy:
      fail-fast: true # જો એક પણ સર્વિસ ફેલ થાય તો પાઇપલાઇન અટકી જશે
      matrix:
        service: [config-server, customer, discovery, gateway, notification, order, payment, product]
    steps:
      - name: "Checkout Source Code"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # ગીટમાં પુશ કરવા માટેની પરમિશન

      - name: "Update Image Tag in YAML"
        run: |
          echo "🔄 Updating image tag for ${{ matrix.service }} to ${{ github.sha }}..."
          
          # ૧. સાચો ફાઇલ પાથ સેટ કરો
          # જો તારી કસ્ટમર સર્વિસની ફાઇલનું નામ customer-service-deployment.yaml હોય તો અહીં ચેન્જ કરજો
          FILE_PATH="k8s-GitOps/microservices/${{ matrix.service }}-deployment.yaml"
          
          # જો કસ્ટમર સર્વિસનું નામ તારી ફાઇલમાં અલગ હોય તો આ સેફ્ટી ચેક હેલ્પ કરશે
          if [ "${{ matrix.service }}" = "customer" ]; then
            if [ ! -f "$FILE_PATH" ]; then
              FILE_PATH="k8s-GitOps/microservices/customer-service-deployment.yaml"
            fi
          fi

          # ૨. 'sed' કમાન્ડનો ઉપયોગ કરીને 'latest' અથવા જૂના ટેગને મેચ કરીને નવો SHA ટેગ રિપ્લેસ કરો
          # આ કમાન્ડ ફાઇલની અંદર ઈમેજ લાઇન શોધીને તેને આપોઆપ બદલી નાખશે
          sed -i -E "s|(image:.*java-microservice-${{ matrix.service }}):.*|\1:${{ github.sha }}|g" $FILE_PATH

          echo "✅ Successfully updated $FILE_PATH"
        shell: bash

      - name: "Commit and Push to GitOps Repo"
        run: |
          git config --global user.name "GitHub Automation"
          git config --global user.email "actions@github.com"
          
          # લેટેસ્ટ ચેન્જ ખેંચવા માટે પેલા પુલ કરો (Conflict ટાળવા માટે)
          git pull origin main
          
          # ચેન્જ થયેલી ફાઇલો એડ કરો
          git add k8s-GitOps/microservices/*.yaml
          
          # જો કોઈ ફાઇલમાં ચેન્જ થયો હોય તો જ કમિટ કરો, નહીંતર સ્કીપ કરો
          if git diff-index --quiet HEAD; then
            echo "No changes detected in manifests."
          else
            git commit -m "chore(gitops): auto-update tags to ${{ github.sha }} [skip ci]"
            git push origin main
          fi
        shell: bash