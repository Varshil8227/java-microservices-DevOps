name: Eventora CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ==========================================
  # CI STAGE: Build and Verify all 8 services
  # ==========================================
  verify-services:
    name: "CI — Java Services Verification"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [config-server, customer, discovery, gateway, notification, order, payment, product]
    steps:
      - name: "Checkout Source Code"
        uses: actions/checkout@v4

      - name: "Set up JDK 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: "Build and Package ${{ matrix.service }}"
        run: |
          cd services/${{ matrix.service }}
          chmod +x mvnw
          ./mvnw clean package -B -ntp -DskipTests -Dmaven.wagon.http.retryHandler.count=5 -Dmaven.wagon.http.retryHandler.requestSentRetryEnabled=true
        shell: bash

      - name: "Validate Build Artifacts"
        run: |
          if [ -d "services/${{ matrix.service }}/target" ]; then
            echo "✅ Target directory exists for ${{ matrix.service }}."
          else
            echo "❌ Target directory missing for ${{ matrix.service }}."
            exit 1
          fi
        shell: bash

  # ==========================================
  # CD STAGE: Build and Push Docker Images
  # ==========================================
  build-and-push-docker:
    name: "CD — Docker Build & Push"
    runs-on: ubuntu-24.04
    needs: verify-services
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    strategy:
      fail-fast: false
      matrix:
        service: [config-server, customer, discovery, gateway, notification, order, payment, product]
    steps:
      - name: "Checkout Source Code"
        uses: actions/checkout@v4

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Login to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Build and Push Docker Image"
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/java-microservice-${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/java-microservice-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}


  # ==========================================
  # GITOPS STAGE: Update Manifests Automatically (Single Unified Commit)
  # ==========================================
  update-gitops:
    name: "GitOps — Update All Image Tags"
    runs-on: ubuntu-latest
    needs: build-and-push-docker
    
    steps:
      - name: "Checkout Source Code"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Update Image Tags for All 8 Services"
        run: |
          echo "🔄 Scanning and updating manifests to SHA: ${{ github.sha }}..."
          
          # બધી ૮ સર્વિસિસનું લિસ્ટ
          SERVICES=("config-server" "customer" "discovery" "gateway" "notification" "order" "payment" "product")
          
          # લૂપ ચલાવીને બધી જ ફાઇલો ઓટોમેટિકલી શોધીને અપડેટ કરશે
          for service in "${SERVICES[@]}"; do
            echo "Processing service: $service"
            
            # ફાઇલ શોધવા માટેના સંભવિત પાથ (સેફ્ટી ગાર્ડ)
            PATHS=(
              "k8s-GitOps/microservices/${service}-deployment.yaml"
              "k8s-GitOps/microservices/${service}-service-deployment.yaml"
              "k8s-GitOps/microservices/${service}.yaml"
            )
            
            FILE_FOUND=false
            for path in "${PATHS[@]}"; do
              if [ -f "$path" ]; then
                # સાચો 'sed' કમાન્ડ જે ઇમેજના નામને ટ્રેક કરીને ટેગ બદલશે
                sed -i -E "s|(image:.*java-microservice-${service}):.*|\1:${{ github.sha }}|g" "$path"
                echo "✅ Updated: $path"
                FILE_FOUND=true
                break
              fi
            done
            
            if [ "$FILE_FOUND" = false ]; then
              echo "⚠️ Warning: Could not find manifest file for $service, skipping."
            fi
          done
        shell: bash

      - name: "Single Unified Commit and Push to GitOps Repo"
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # ૧. સ્ટેજિંગ એરિયામાં બધી જ YAML ફાઇલો એડ કરો
          git add k8s-GitOps/microservices/*.yaml
          
          # ૨. ચેક કરો કે ખરેખર કોઈ ફેરફાર થયો છે કે નહીં
          if git diff-index --quiet HEAD; then
            echo "No changes detected in manifests. Skipping commit."
          else
            # ૩. કમિટ કરતા પહેલા લેટેસ્ટ ગીટ હિસ્ટ્રી સિંક કરો
            git pull origin main --rebase
            
            # ૪. એક જ સિંગલ કમિટ મેસેજ [skip ci] સાથે જેથી કોઈ લૂપ ન બને
            git commit -m "chore(gitops): auto-update all microservices tags to ${{ github.sha }} [skip ci]"
            
            # ૫. ફાઇનલ પુશ
            git push origin main
          fi
        shell: bash