apiVersion: apps/v1
kind: Deployment
metadata:
  name: maildev
  namespace: default
  labels:
    app: maildev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maildev
  template:
    metadata:
      labels:
        app: maildev
    spec:
      containers:
        - name: maildev
          image: maildev/maildev:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 1080
              name: web
            - containerPort: 1025
              name: smtp
---
apiVersion: v1
kind: Service
metadata:
  name: maildev-service
  namespace: default
spec:
  ports:
    - name: web
      port: 1080
      targetPort: 1080
    - name: smtp
      port: 1025
      targetPort: 1025
  selector:
    app: maildev
