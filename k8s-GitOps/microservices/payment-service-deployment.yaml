apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: default
  labels:
    app: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: varshil1110/java-microservice-payment:a943ad6e8a5573793addbd79392338e46a0d7cb6
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8060
              name: http
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          env:
            - name: CONFIG_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: CONFIG_SERVER_URL
            - name: EUREKA_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: EUREKA_SERVER_URL
            - name: EUREKA_HOSTNAME
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: EUREKA_HOSTNAME
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: DB_PORT
            - name: DB_NAME
              value: "payment"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: microservices-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: microservices-secrets
                  key: DB_PASSWORD
            # 🔥 Kafka Connection Spring Boot Fix
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: PRODUCT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: PRODUCT_SERVICE_URL
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8060
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8060
            initialDelaySeconds: 80
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: default
spec:
  ports:
    - port: 8060
      targetPort: 8060
  selector:
    app: payment-service