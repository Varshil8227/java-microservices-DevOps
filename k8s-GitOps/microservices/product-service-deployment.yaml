apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: default
  labels:
    app: product-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      initContainers:
        - name: wait-for-config-server
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://config-server:8888/actuator/health 2>/dev/null | grep -q '"status":"UP"'; do
                echo "Waiting for config-server..."; sleep 5
              done
              echo "config-server UP"
        - name: wait-for-discovery
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://discovery-service:8761/actuator/health 2>/dev/null | grep -q '"status":"UP"'; do
                echo "Waiting for discovery-service..."; sleep 5
              done
              echo "discovery-service UP"
      containers:
        - name: product-service
          image: varshil1110/java-microservice-product:be35f7b00ab777638e344b11cf5959312c944539
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8050
              name: http
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          env:
            - name: CONFIG_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: CONFIG_SERVER_URL
            - name: EUREKA_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: EUREKA_SERVER_URL
            - name: EUREKA_HOSTNAME
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: EUREKA_HOSTNAME
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: DB_PORT
            - name: DB_NAME
              value: "product"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: microservices-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: microservices-secrets
                  key: DB_PASSWORD
            - name: MANAGEMENT_TRACING_ENABLED
              value: "false"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8050
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8050
            initialDelaySeconds: 80
            periodSeconds: 20
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: default
spec:
  ports:
    - port: 8050
      targetPort: 8050
  selector:
    app: product-service