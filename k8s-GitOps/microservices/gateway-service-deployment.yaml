apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: default
  labels:
    app: gateway-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      initContainers:
        - name: wait-for-config-server
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://config-server:8888/actuator/health 2>/dev/null | grep -q '"status":"UP"'; do
                echo "Waiting for config-server..."; sleep 5
              done
              echo "config-server UP"
        - name: wait-for-discovery
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://discovery-service:8761/actuator/health 2>/dev/null | grep -q '"status":"UP"'; do
                echo "Waiting for discovery-service..."; sleep 5
              done
              echo "discovery-service UP"
      containers:
        - name: gateway-service
          image: varshil1110/java-microservice-gateway:53a91cb13759648d21adc4cf452042125104125e
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8222
              name: http
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          env:
            - name: CONFIG_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: CONFIG_SERVER_URL
            - name: EUREKA_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: EUREKA_SERVER_URL
            - name: EUREKA_HOSTNAME
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: EUREKA_HOSTNAME
            - name: MANAGEMENT_TRACING_ENABLED
              value: "false"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8222
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8222
            initialDelaySeconds: 70
            periodSeconds: 20
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: default
spec:
  ports:
    - port: 8222
      targetPort: 8222
  selector:
    app: gateway-service