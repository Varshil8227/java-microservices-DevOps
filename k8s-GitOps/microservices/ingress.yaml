apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: microservices-ingress
  namespace: default
  annotations:
    # Use NGINX Ingress Controller by default
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
    # Replace with your actual domain name or use a local hosts mapping (e.g. ecommerce.local)
    - host: ecommerce-microservices.local
      http:
        paths:
          # Route all API calls to the API gateway
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway-service
                port:
                  number: 8222
