apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: default
  labels:
    app: config-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      # config-server has no dependencies - starts first, no initContainers needed
      containers:
        - name: config-server
          image: varshil1110/java-microservice-config-server:2e5535f4f92878db30114e45cb58e6bbc90b080e
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
              name: http
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "native"
            - name: MANAGEMENT_TRACING_ENABLED
              value: "false"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8888
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8888
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: default
spec:
  ports:
    - port: 8888
      targetPort: 8888
  selector:
    app: config-server