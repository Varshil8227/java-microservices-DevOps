apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-service
  namespace: default
  labels:
    app: discovery-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-service
  template:
    metadata:
      labels:
        app: discovery-service
    spec:
      initContainers:
        - name: wait-for-config-server
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for config-server to be UP..."
              until wget -qO- http://config-server:8888/actuator/health 2>/dev/null | grep -q '"status":"UP"'; do
                echo "config-server not ready yet, retrying in 5s..."
                sleep 5
              done
              echo "config-server is UP! Starting discovery-service..."
      containers:
        - name: discovery-service
          image: varshil1110/java-microservice-discovery:53a91cb13759648d21adc4cf452042125104125e
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8761
              name: http
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          env:
            - name: CONFIG_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: CONFIG_SERVER_URL
            - name: MANAGEMENT_TRACING_ENABLED
              value: "false"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8761
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: discovery-service
  namespace: default
spec:
  ports:
    - port: 8761
      targetPort: 8761
  selector:
    app: discovery-service