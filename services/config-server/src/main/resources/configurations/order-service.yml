server:
  port: 8070
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:order}}
    username: ${DB_USERNAME:alibou}
    password: ${DB_PASSWORD:alibou}
  jpa:
    hibernate:
      ddl-auto: update
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    producer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: orderConfirmation:com.alibou.ecommerce.kafka.OrderConfirmation

application:
  config:
    customer-url: ${CUSTOMER_SERVICE_URL:http://localhost:8222/api/v1/customers}
    payment-url: ${PAYMENT_SERVICE_URL:http://localhost:8222/api/v1/payments}
    product-url: ${PRODUCT_SERVICE_URL:http://localhost:8222/api/v1/products}
